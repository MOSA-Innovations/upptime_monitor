owner: MOSA-Innovations  # Your GitHub organization or username, where this repository lives
repo: upptime_monitor # The name of this repository

sites:
  - name: MOSA INNOVATIONS
    url: https://www.mosainnovations.com/
  - name: EVERY BIKE SECURE
    url: https://www.everybikesecure.com/
  - name: MOSA WORKS
    url: https://www.workwithmosa.com/
  - name: MOSA (old)
